<div id="desktop-view">

    <!--Loading screen for main panel-->

    <div class="desktop-panel" ng-if="!clients || saveInProgress == true">
        <div></div>
        <div class="loading-panel">
            <div class="icon">
                <i class="fa fa-spinner fa-pulse fa-3x fa-fw"></i>
            </div>
        </div>
        <div></div>
    </div>

    <!--Main panel-->

    <div class="desktop-panel" ng-if="clients && step == 'select'">

        <div class="back-bar">
            <div class="back-button" title="Return to the previous page" onclick="window.history.back();">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h2 style="align-self:center; padding-top:7px;">Users</h2>
            <div class="back-button-disabled"></div>
        </div>

        <div style="align-self:center; width:40%;">
            <div ng-if="clients.length > 1 || !user.internal">
                <label>Client:</label>
                <div class="single-address">
                    <div class="address-payload">
                        <div class="address-component">
                            <select class="data-input" ng-model="user.selectedClient" ng-change="getContacts()" ng-options="client as client.name for client in clients">
                                <option value="" disabled selected hidden>Select a client...</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div style="height:16px;"></div>
            </div>

            <div ng-if="user.internal">
                <label>Client Search:</label>
                <div class="single-address">
                    <div class="address-payload">
                        <div class="address-component">
                            <ui-select ng-model="user.selectedClient"
                                       ng-change="getContacts()"
                                       skip-focusser="true"
                                       style="width:100%">
                                <ui-select-match placeholder="Search for a client...">
                                    <span ng-bind="$select.selected.name + ' - ' + $select.selected.code + ' - ' + $select.selected.americanCity"></span>
                                </ui-select-match>
                                <ui-select-choices repeat="client as client in (delayedClients | filter: $select.search | limitTo: 50)" refresh="realResults($select.search)" refresh-delay="0">
                                    <span ng-bind="client.name + ' - ' + client.code + ' - ' + client.americanCity"></span>
                                </ui-select-choices>
                            </ui-select>
                        </div>
                    </div>
                </div>

                <div style="height:16px;"></div>
            </div>

            <label ng-if="contacts != null && contacts.length >= 1 && user.selectedClient">User:</label>
            <div class="single-address" ng-if="contacts != null && contacts.length >= 1 && user.selectedClient">
                <div class="address-payload">
                    <div class="address-component">
                        <select class="data-input" ng-model="user.selectedContact" ng-options="contact as contact.name for contact in contacts">
                            <option value="" selected>--- None Selected ---</option>
                        </select>
                    </div>
                </div>

                <div style="height:16px;"></div>
            </div>

            <button style="width:100%" ng-disabled="!user.selectedClient || user.selectedContact" ng-click="createContact()"><b>Create New User</b></button>
        </div>

        <button class="confirm-button" ng-disabled="!user.selectedContact" ng-class="{'disabled-Button': !user.selectedContact}" ng-click="editContact()">Edit User</button>
    </div>

    <div class="desktop-panel" ng-if="step == 'edit' && saveInProgress != true">
        <div>
            <div class="back-bar">
                <div class="back-button" title="Change selected client" ng-click="contactBack()">
                    <i class="fas fa-arrow-left"></i>
                </div>
                <h2 style="align-self:center; padding-top:7px;">Edit User</h2>
                <div class="back-button-disabled" ng-if="!user.selectedContact.id"></div>
                <div class="clear-button-saved" title="Delete this user" ng-if="user.selectedContact.id" ng-click="deleteContactAll()">
                    <i class="fas fa-trash"></i>
                </div>
            </div>

            <div style="display:flex;flex-direction:row;justify-content:space-between;">
                <div class="savedBooking-buttons" ng-style="{ 'width' : user.selectedContact.id ? '33%' : '100%'}" ng-class="{selected: page == 'contact'}" ng-click="setPage('contact')">User</div>
                <div class="savedBooking-buttons" style="width:34%" ng-class="{selected: page == 'defaults'}" ng-click="setPage('defaults')" ng-if="user.selectedContact.id">Defaults</div>
                <div class="savedBooking-buttons" style="width:33%" ng-class="{selected: page == 'internetPermissions'}" ng-click="setPage('internetPermissions')" ng-if="user.selectedContact.id">Internet Permissions</div>
                <!--<div class="savedBooking-buttons" style="width:25%" ng-class="{selected: page == 'subscriptions'}" ng-click="setPage('subscriptions')" ng-if="user.selectedContact.id">Subscriptions</div>-->
            </div>
        </div>

        <div ng-if="page == 'contact'">
            <div class="form-group fixed-height">
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">First Name:</label>
                    <input class="form-control" maxlength="50" placeholder="Enter your first name..." ng-model="user.selectedContact.firstName" />
                </div>
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Last Name:</label>
                    <input class="form-control" maxlength="50" placeholder="Enter your last name..." ng-model="user.selectedContact.lastName" />
                </div>
            </div>

            <div class="form-group fixed-height">
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Email:</label>
                    <input class="form-control" maxlength="150" placeholder="Enter your email..." ng-model="user.selectedContact.email" />
                </div>
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Password:</label>
                    <div class="input-group" style="flex-direction:row;padding-left:0px;padding-right:0px;">
                        <input class="form-control" type="{{showPassword ? 'text' : 'password'}}" maxlength="50" placeholder="Enter your password..." ng-disabled="user.selectedContact.id" ng-model="user.selectedContact.password" />
                        <div class="input-group-append">
                            <button class="input-group-text" ng-disabled="user.selectedContact.id" ng-click="togglePassword()">{{showPassword ? 'Hide' : 'Show'}}</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group fixed-height">
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Mobile (optional):</label>
                    <input class="form-control" maxlength="20" placeholder="Enter your phone number..." ng-model="user.selectedContact.mobile" />
                </div>
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Direct Dial (optional):</label>
                    <input class="form-control" maxlength="20" placeholder="Enter your phone number..." ng-model="user.selectedContact.directDial" />
                </div>
            </div>

            <div class="form-group fixed-height">
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Job Title (optional):</label>
                    <input class="form-control" maxlength="50" placeholder="Enter your job title..." ng-model="user.selectedContact.jobTitle" />
                </div>
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Relationship with Urgent (optional):</label>
                    <select class="form-control" ng-model="user.selectedContact.relationshipWithUrgent" ng-options="relWithUrgent.id as relWithUrgent.name for relWithUrgent in relWithUrgents">
                        <option value="" selected>Select your relationship...</option>
                    </select>
                </div>
            </div>

            <div class="form-group fixed-height" ng-if="user.selectedClient.id == 9673">
                <div class="col-sm-12 pad-bottom">
                    <label class="control-label">Access Code:</label>
                    <input class="form-control" maxlength="50" placeholder="Enter an access code..." ng-model="user.selectedContact.accessCode" />
                </div>
            </div>
        </div>

        <div ng-if="page == 'defaults'">
            <div class="form-group fixed-height">
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Job Type:</label>
                    <select class="form-control" ng-model="clientContact.defaultJobType" ng-options="jobType.id as jobType.name for jobType in jobTypes"> </select>
                </div>
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Tracking Method:</label> <!--If tracking method null set to 0 when gotten-->
                    <select class="form-control" ng-model="clientContact.defaultTrackingMethod" ng-options="trackingMethod.id as trackingMethod.name for trackingMethod in trackingMethods"> </select>
                </div>
            </div>

            <div class="form-group fixed-height">
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Vehicle Size:</label>
                    <select class="form-control" ng-model="clientContact.defaultJobSize" ng-options="jobSize.id as jobSize.name for jobSize in jobSizes">
                        <option value="" selected>--- None Selected ---</option>
                    </select>
                </div>
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Tracking Email:</label>
                    <input class="form-control" maxlength="100" ng-model="clientContact.defaultTrackingEmail" />
                </div>
            </div>

            <div class="form-group fixed-height">
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Job Service:</label>
                    <select class="form-control" ng-model="clientContact.defaultJobSpeed" ng-options="jobSpeed.id as jobSpeed.name for jobSpeed in jobSpeeds"> </select>
                </div>
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Tracking Mobile:</label>
                    <input class="form-control" maxlength="100" ng-model="clientContact.defaultTrackingMobile" />
                </div>
            </div>
            <div class="form-group fixed-height">
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Package Size:</label>
                    <select class="form-control" ng-model="clientContact.defaultPackageSize" ng-options="stockSize.id as stockSize.name for stockSize in user.selectedClient.stockSizes">
                        <option value="" selected>--- None Selected ---</option>
                    </select>
                </div>
                <div class="col-sm-6 pad-bottom">
                    <label class="control-label">Set Jobs to Hold</label>
                    <input class="form-control" style="display:flex;" type="checkbox" ng-model="clientContact.holdJobs" />
                </div>
            </div>
            <div class="form-group fixed-height" ng-if="user.selectedClient.addressBookOnly">
                <div class="col-sm-12 pad-bottom">
                    <label class="control-label">Address Book:</label>
                    <select class="form-control" ng-model="clientContact.defaultClientAddressBookId"
                            ng-options="addressBook.id as ((addressBook.code ? addressBook.code + ' - ' : '? - ') + addressBook.deliverTo) for addressBook in addressBooks | orderBy: 'code'">
                        <option value="" selected>--- None Selected ---</option>
                    </select>
                </div>
            </div>
        </div>

        <div ng-if="page == 'internetPermissions'">
            <table class="table table-striped table-raised-filter">
                <thead>
                    <tr>
                        <th>Permission</th>
                        <th>Allowed</th>
                    </tr>
                </thead>
                <tbody>
                    <tr dir-paginate="internetPermission in allInternetPermissions | orderBy: 'name' | itemsPerPage: 10 track by internetPermission.id">
                        <td>{{internetPermission.name}}</td>
                        <td><input type="checkbox" ng-disabled="internetPermission.disabled" ng-model="internetPermission.selected" /></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!--<div ng-if="page == 'subscriptions'">
            <table class="table table-striped table-raised-filter">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Subscribed</th>
                    </tr>
                </thead>
                <tbody>
                    <tr dir-paginate="subscription in subscriptions | orderBy: 'name' | itemsPerPage: 18 track by subscription.id">
                        <td>{{subscription.name}}</td>
                        <td><input type="checkbox" ng-model="subscription.selected" /></td>
                    </tr>
                </tbody>
            </table>
        </div>-->

        <div>
            <div class="alert alert-danger error" role="alert" style="margin-bottom:0px" ng-show="user.errors.length > 0">
                <div ng-repeat="error in user.errors track by $index">{{error}}</div>
            </div>

            <!-- Need to check if errythang is valid before updating -->
            <button class="confirm-button" ng-disabled="false" ng-class="{'disabled-Button': false}" ng-click="checkFormData()">Save Changes</button>
        </div>
    </div>
</div>
