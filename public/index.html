<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DD Booking Race — Training Mode</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Courier New',monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* Top bar */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 20px;background:linear-gradient(90deg,#1a0533,#0a0a1a);border-bottom:2px solid #ff6b35;flex-shrink:0}
.top-bar h1{font-size:16px;color:#00e5ff;text-transform:uppercase;letter-spacing:3px;text-shadow:0 0 10px rgba(0,229,255,0.5)}
.top-bar .hud{display:flex;gap:20px;font-size:13px}
.top-bar .hud span{color:#888}
.top-bar .hud strong{color:#00e5ff;font-size:15px}

/* Main split */
.main{display:flex;flex:1;overflow:hidden}
.left{width:55%;border-right:2px solid #1a1a3a;position:relative;overflow:hidden}
.left iframe{width:100%;height:100%;border:none;background:#fff}
.right{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a15;position:relative}

/* Mission overlay */
.mission-overlay{position:absolute;top:10px;left:10px;background:rgba(10,10,26,0.93);border:1px solid #333;border-radius:8px;padding:10px 14px;z-index:10;max-width:300px;font-size:12px;backdrop-filter:blur(4px)}
.mission-overlay h3{color:#ff6b35;font-size:12px;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.mission-overlay .step{padding:3px 0;color:#555;transition:all 0.3s}
.mission-overlay .step.done{color:#00cc66;text-decoration:line-through;opacity:0.5}
.mission-overlay .step.current{color:#00e5ff;font-weight:bold}
.mission-overlay .step.current::before{content:'▶ ';color:#ff6b35}

/* Event feed */
.event-feed{position:absolute;bottom:10px;right:10px;background:rgba(10,10,26,0.92);border:1px solid #333;border-radius:8px;padding:8px 12px;z-index:10;max-width:320px;max-height:140px;overflow-y:auto;font-size:11px;backdrop-filter:blur(4px)}
.event-feed div{padding:2px 0;color:#666;border-bottom:1px solid rgba(255,255,255,0.05)}
.event-feed div:first-child{color:#00e5ff}

/* Finish overlay */
.finish-overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,10,26,0.95);z-index:50;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.finish-overlay.show{display:flex}
.finish-overlay h2{font-size:36px;color:#ff6b35;text-shadow:0 0 30px rgba(255,107,53,0.6);margin-bottom:10px}
.finish-overlay .final-xp{font-size:60px;color:#00e5ff;text-shadow:0 0 40px rgba(0,229,255,0.5);margin:10px 0}
.finish-overlay .stats{font-size:14px;color:#888;line-height:2}
.finish-overlay .stats strong{color:#00e5ff}
.finish-overlay button{margin-top:20px;padding:12px 40px;background:#ff6b35;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:2px}
.finish-overlay button:hover{background:#ff8855}

/* Leaderboard */
.leaderboard{position:absolute;top:10px;right:10px;background:rgba(10,10,26,0.92);border:1px solid #ff6b35;border-radius:8px;padding:8px 12px;z-index:10;min-width:160px;font-size:11px;backdrop-filter:blur(4px)}
.leaderboard h4{color:#ff6b35;font-size:11px;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;text-align:center}
.leaderboard .entry{display:flex;justify-content:space-between;padding:2px 0;color:#888}
.leaderboard .entry.you{color:#00e5ff;font-weight:bold}
.leaderboard .entry .rank{width:20px}
.leaderboard .entry .pts{color:#00e5ff}

canvas{border:2px solid #1a1a3a;border-radius:6px;display:block;max-width:100%;max-height:100%}
</style>
</head>
<body>

<div class="top-bar">
  <h1>🏎️ DD Booking Race</h1>
  <div class="hud">
    <span>Step: <strong id="stepCount">0/5</strong></span>
    <span>XP: <strong id="xp">0</strong></span>
    <span>Combo: <strong id="combo">x1.0</strong></span>
    <span>Speed: <strong id="speed">0</strong> km/h</span>
    <span>Time: <strong id="timer">0.0s</strong></span>
  </div>
</div>

<div class="main">
  <div class="left">
    <iframe id="bookingFrame" src="BOOKING_URL_PLACEHOLDER"></iframe>
    <div class="mission-overlay">
      <h3>Mission: Book a Delivery</h3>
      <div id="missionSteps"></div>
    </div>
  </div>
  <div class="right">
    <div class="leaderboard" id="leaderboard">
      <h4>🏆 Leaderboard</h4>
    </div>
    <canvas id="raceCanvas"></canvas>
    <div class="event-feed" id="eventFeed"></div>
    <div class="finish-overlay" id="finishOverlay">
      <h2>🏁 MISSION COMPLETE!</h2>
      <div class="final-xp" id="finalXP">0</div>
      <div>XP</div>
      <div class="stats">
        <div>Time: <strong id="finalTime">0.0s</strong></div>
        <div>Time Bonus: <strong id="timeBonus">x1.0</strong></div>
        <div>Overtakes: <strong id="finalOvertakes">0</strong></div>
        <div>Max Combo: <strong id="finalCombo">x1.0</strong></div>
        <div>Final Score: <strong id="finalScore">0</strong></div>
      </div>
      <button onclick="restartGame()">Race Again</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───
const BOOKING_URL = window.BOOKING_URL || '';

// Set iframe src from env-injected URL or same-origin fallback
(function(){
  const frame = document.getElementById('bookingFrame');
  const src = frame.getAttribute('src');
  if (src === 'BOOKING_URL_PLACEHOLDER') {
    // Will be replaced server-side, but fallback to same origin
    frame.src = '/';
  }
})();

// ─── MISSION ───
const STEPS = [
  { id:'address', label:'Type pickup address', detect:'addressTyped' },
  { id:'autocomplete', label:'Select from autocomplete', detect:'autocompleteSelected' },
  { id:'parcel', label:'Select parcel size', detect:'parcelSelected' },
  { id:'speed', label:'Choose delivery speed', detect:'speedSelected' },
  { id:'book', label:'Click Book', detect:'jobBooked' }
];

let currentStep=0, missionDone=false;
let comboVal=1, maxCombo=1, raceSpeed=0, xpVal=0, overtakeCount=0;
let nitroTimer=0, screenFlash=0;
let startTime=null, elapsed=0;
let lastDetected={};

// ─── LEADERBOARD (localStorage) ───
function getLeaderboard(){
  try{ return JSON.parse(localStorage.getItem('dd-race-lb')||'[]'); }catch(e){ return []; }
}
function saveScore(score){
  const name = prompt('Enter your nickname for the leaderboard:','Player');
  if(!name) return;
  const lb = getLeaderboard();
  lb.push({ name: name.substring(0,12), score, time: elapsed, date: Date.now() });
  lb.sort((a,b)=>b.score-a.score);
  localStorage.setItem('dd-race-lb', JSON.stringify(lb.slice(0,20)));
  renderLeaderboard(score);
}
function renderLeaderboard(highlightScore){
  const lb = getLeaderboard();
  const el = document.getElementById('leaderboard');
  let html = '<h4>🏆 Leaderboard</h4>';
  lb.slice(0,8).forEach((e,i)=>{
    const you = (e.score===highlightScore)?'you':'';
    html+=`<div class="entry ${you}"><span class="rank">${i+1}.</span><span>${e.name}</span><span class="pts">${e.score}</span></div>`;
  });
  if(lb.length===0) html+='<div class="entry"><span>No scores yet</span></div>';
  el.innerHTML=html;
}

// ─── STEP RENDERING ───
const stepsEl=document.getElementById('missionSteps');
function renderSteps(){
  stepsEl.innerHTML='';
  STEPS.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='step'+(i<currentStep?' done':'')+(i===currentStep?' current':'');
    d.textContent=`${i+1}. ${s.label}`;
    stepsEl.appendChild(d);
  });
  document.getElementById('stepCount').textContent=`${Math.min(currentStep,STEPS.length)}/${STEPS.length}`;
}

function logEvent(msg){
  const feed=document.getElementById('eventFeed');
  const d=document.createElement('div');
  d.textContent=`${new Date().toLocaleTimeString()} — ${msg}`;
  feed.prepend(d);
  if(feed.children.length>20) feed.removeChild(feed.lastChild);
}

function completeStep(){
  if(currentStep>=STEPS.length) return;
  if(!startTime) startTime=performance.now();
  const step=STEPS[currentStep];
  comboVal=Math.min(3,comboVal+0.4);
  if(comboVal>maxCombo) maxCombo=comboVal;
  const boost=30*comboVal;
  raceSpeed=Math.min(280,raceSpeed+boost);
  xpVal+=Math.round(100*comboVal);
  overtakeCount+=Math.floor(comboVal);
  nitroTimer=80;
  screenFlash=15;
  for(let i=0;i<4;i++) traffic.push(makeTraffic());
  logEvent(`✅ ${step.label} (+${Math.round(100*comboVal)} XP, combo x${comboVal.toFixed(1)})`);
  currentStep++;
  if(currentStep>=STEPS.length){
    missionDone=true;
    elapsed=((performance.now()-startTime)/1000);
    logEvent('🏁 MISSION COMPLETE! Job booked!');
    setTimeout(showFinish, 1500);
  }
  updateHUD();
  renderSteps();
}

function showFinish(){
  const baselineTime=60; // seconds
  const timeMultiplier=Math.max(0.5, Math.min(3, baselineTime/Math.max(1,elapsed)));
  const finalScore=Math.round(xpVal*timeMultiplier);
  document.getElementById('finalXP').textContent=xpVal;
  document.getElementById('finalTime').textContent=elapsed.toFixed(1)+'s';
  document.getElementById('timeBonus').textContent='x'+timeMultiplier.toFixed(2);
  document.getElementById('finalOvertakes').textContent=overtakeCount;
  document.getElementById('finalCombo').textContent='x'+maxCombo.toFixed(1);
  document.getElementById('finalScore').textContent=finalScore;
  document.getElementById('finishOverlay').classList.add('show');
  saveScore(finalScore);
}

function restartGame(){
  document.getElementById('finishOverlay').classList.remove('show');
  currentStep=0; missionDone=false; comboVal=1; maxCombo=1; raceSpeed=0; xpVal=0; overtakeCount=0;
  nitroTimer=0; screenFlash=0; startTime=null; elapsed=0; lastDetected={};
  resetRace(); renderSteps(); updateHUD(); renderLeaderboard();
  document.getElementById('bookingFrame').src=document.getElementById('bookingFrame').src;
}

function updateHUD(){
  document.getElementById('xp').textContent=xpVal;
  document.getElementById('combo').textContent='x'+comboVal.toFixed(1);
  document.getElementById('speed').textContent=Math.round(raceSpeed);
}

// ─── IFRAME DETECTION ───
setInterval(()=>{
  if(missionDone) return;
  if(startTime) {
    elapsed=(performance.now()-startTime)/1000;
    document.getElementById('timer').textContent=elapsed.toFixed(1)+'s';
  }
  try{
    const frame=document.getElementById('bookingFrame');
    const doc=frame.contentDocument||frame.contentWindow.document;
    const step=STEPS[currentStep];
    if(!step) return;

    switch(step.detect){
      case 'addressTyped': {
        const inputs=doc.querySelectorAll('input[type="text"], input.pac-target-input, input[ng-model*="ddress"], input[placeholder*="ddress" i]');
        for(const inp of inputs){
          if(inp.value && inp.value.length>5 && !lastDetected.address){
            lastDetected.address=true;
            completeStep();
            return;
          }
        }
        // Broader: any visible text input with enough chars
        const allInputs = doc.querySelectorAll('input[type="text"]');
        for(const inp of allInputs){
          if(inp.value && inp.value.length>8 && inp.offsetParent !== null && !lastDetected.address){
            lastDetected.address=true;
            completeStep();
            return;
          }
        }
        break;
      }
      case 'autocompleteSelected': {
        const allInputs=doc.querySelectorAll('input');
        let filled=0;
        allInputs.forEach(i=>{ if(i.value && i.value.length>2) filled++; });
        if(filled>=3 && !lastDetected.autocomplete){
          lastDetected.autocomplete=true;
          completeStep();
          return;
        }
        // Check for suburb/city fields specifically
        const suburbInputs = doc.querySelectorAll('input[ng-model*="uburb"], input[ng-model*="ity"], input[name*="suburb" i], input[name*="city" i]');
        for(const inp of suburbInputs){
          if(inp.value && inp.value.length>2 && !lastDetected.autocomplete){
            lastDetected.autocomplete=true;
            completeStep();
            return;
          }
        }
        break;
      }
      case 'parcelSelected': {
        const selects=doc.querySelectorAll('select');
        for(const sel of selects){
          const text=(sel.options[sel.selectedIndex]||{}).text||'';
          if(text.match(/satchel|box|parcel|small|medium|large|banana/i) && !lastDetected.parcel){
            lastDetected.parcel=true;
            completeStep();
            return;
          }
        }
        const dimItems=doc.querySelectorAll('.dimension-item.selected, .stock-size.selected, .size-option.active, [class*="stock"][class*="selected"]');
        if(dimItems.length>0 && !lastDetected.parcel){
          lastDetected.parcel=true;
          completeStep();
          return;
        }
        break;
      }
      case 'speedSelected': {
        const speedEls=doc.querySelectorAll('.speed-option.selected, .speed.selected, .rate-card.selected, [class*="speed"][class*="selected"], [class*="rate"][class*="selected"]');
        if(speedEls.length>0 && !lastDetected.speed){
          lastDetected.speed=true;
          completeStep();
          return;
        }
        const radios=doc.querySelectorAll('input[type="radio"]:checked');
        radios.forEach(r=>{
          if((r.name||'').match(/speed/i) && !lastDetected.speed){
            lastDetected.speed=true;
            completeStep();
          }
        });
        break;
      }
      case 'jobBooked': {
        const body=doc.body?doc.body.innerText:'';
        if(body.match(/booked|confirmed|success|TEST-\d+/i) && !lastDetected.booked){
          lastDetected.booked=true;
          completeStep();
          return;
        }
        break;
      }
    }
  }catch(e){ /* cross-origin fallback below */ }
},500);

window.addEventListener('message',(e)=>{
  if(e.data && e.data.type==='booking-step') completeStep();
});

// ─── PSEUDO-3D RACE ENGINE ───
const canvas=document.getElementById('raceCanvas');
const ctx=canvas.getContext('2d');

function resizeCanvas(){
  const container=canvas.parentElement;
  const w=container.clientWidth-20;
  const h=container.clientHeight-60;
  canvas.width=Math.min(600,w);
  canvas.height=Math.min(600,h);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const SEGMENTS=300, SEG_LEN=200, ROAD_W=2000;
const CAM_DEPTH=0.84;
let segments_road=[];
let playerX=0, roadPos=0;
let traffic=[];
let particles=[];

function initRoad(){
  segments_road=[];
  for(let i=0;i<SEGMENTS;i++){
    segments_road.push({
      curve: Math.sin(i*0.02)*3+Math.sin(i*0.007)*5,
      y: Math.sin(i*0.015)*40+Math.sin(i*0.03)*20,
      sprite: (i%18===0)?'tree_l':(i%18===9)?'tree_r':(i%25===0)?'sign':null
    });
  }
}

function makeTraffic(){
  return { seg:Math.floor(Math.random()*SEGMENTS*0.6)+20, lane:(Math.random()-0.5)*1.4, color:`hsl(${Math.random()*360},70%,50%)` };
}

function resetRace(){
  initRoad();
  traffic=[];
  for(let i=0;i<8;i++) traffic.push(makeTraffic());
  playerX=0; roadPos=0; particles=[];
}

function project(px,py,pz,camX,camY){
  const W=canvas.width, H=canvas.height;
  const tx=px-camX, ty=py-camY;
  const scale=CAM_DEPTH/pz;
  return { x:W/2+scale*tx*W/2, y:H/2-scale*ty*H/2, w:scale*ROAD_W*W/2, scale };
}

function drawPoly(x1,y1,w1,x2,y2,w2,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(x1-w1,y1);ctx.lineTo(x1+w1,y1);ctx.lineTo(x2+w2,y2);ctx.lineTo(x2-w2,y2);
  ctx.fill();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.fill();
}

function drawTree(x,y,scale,side){
  const W=canvas.width;
  const sz=scale*300;if(sz<2)return;
  const ox=side==='l'?-1:1;
  const tx=x+ox*scale*ROAD_W*0.6*W/2*0.5;
  ctx.fillStyle='#4a2810';ctx.fillRect(tx-sz*0.08,y-sz*0.6,sz*0.16,sz*0.6);
  ctx.fillStyle='#0a3d1a';ctx.beginPath();ctx.arc(tx,y-sz*0.7,sz*0.35,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a5c2a';ctx.beginPath();ctx.arc(tx-sz*0.08,y-sz*0.78,sz*0.18,0,Math.PI*2);ctx.fill();
}

function drawSign(x,y,scale){
  const W=canvas.width;
  const sz=scale*250;if(sz<2)return;
  const sx=x+scale*ROAD_W*0.7*W/2*0.5;
  ctx.fillStyle='#666';ctx.fillRect(sx-sz*0.03,y-sz*0.8,sz*0.06,sz*0.8);
  ctx.fillStyle='#ff6b35';ctx.fillRect(sx-sz*0.25,y-sz*0.9,sz*0.5,sz*0.3);
  ctx.fillStyle='#fff';ctx.font=`${Math.max(6,sz*0.12)}px monospace`;ctx.textAlign='center';
  ctx.fillText('DD RACE',sx,y-sz*0.72);
}

function drawPlayerCar(x,y,tilt){
  const w=35,h=55;
  ctx.save();ctx.translate(x,y);ctx.rotate(tilt*0.03);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(0,h*0.3,w*0.9,8,0,0,Math.PI*2);ctx.fill();
  // Body
  const grad=ctx.createLinearGradient(-w,0,w,0);
  grad.addColorStop(0,'#0066cc');grad.addColorStop(0.5,'#00ccff');grad.addColorStop(1,'#0066cc');
  ctx.fillStyle=grad;roundRect(-w/2,-h/2,w,h,6);
  // Windshield
  ctx.fillStyle='#001a33';roundRect(-w*0.35,-h*0.25,w*0.7,h*0.2,3);
  ctx.fillStyle='#001a33';roundRect(-w*0.35,h*0.15,w*0.7,h*0.15,3);
  // Taillights
  ctx.fillStyle=nitroTimer>0?'#00e5ff':'#ff2244';
  ctx.fillRect(-w/2+2,h/2-6,8,4);ctx.fillRect(w/2-10,h/2-6,8,4);
  // Nitro flames
  if(nitroTimer>0){
    const flameH=20+Math.random()*30;
    const fg=ctx.createLinearGradient(0,h/2,0,h/2+flameH);
    fg.addColorStop(0,'#00e5ff');fg.addColorStop(0.4,'#0066ff');fg.addColorStop(1,'rgba(0,100,255,0)');
    ctx.fillStyle=fg;ctx.beginPath();
    ctx.moveTo(-10,h/2);ctx.quadraticCurveTo(-15+Math.random()*5,h/2+flameH*0.6,0,h/2+flameH);
    ctx.quadraticCurveTo(15-Math.random()*5,h/2+flameH*0.6,10,h/2);ctx.fill();
  }
  ctx.restore();
}

function drawTrafficCar(sx,sy,scale,color){
  const w=scale*1200,h=scale*800;if(w<2)return;
  ctx.fillStyle=color;roundRect(sx-w/2,sy-h,w,h,w*0.1);
  ctx.fillStyle='rgba(0,0,0,0.4)';roundRect(sx-w*0.35,sy-h*0.7,w*0.7,h*0.2,w*0.05);
}

function spawnParticles(x,y,n){
  for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-0.5)*8,vy:-Math.random()*6-2,life:30+Math.random()*20,color:`hsl(${190+Math.random()*40},100%,${60+Math.random()*30}%)`});
}

let lastTime=0;
function gameLoop(ts){
  const W=canvas.width, H=canvas.height;
  const dt=Math.min(32,(ts-lastTime))||16; lastTime=ts;

  roadPos+=raceSpeed*dt*0.002;
  const baseSeg=Math.floor(roadPos/SEG_LEN)%SEGMENTS;
  const curCurve=segments_road[baseSeg]?segments_road[baseSeg].curve:0;
  playerX+=(curCurve*0.02-playerX)*0.05;
  playerX=Math.max(-1,Math.min(1,playerX));
  raceSpeed=Math.max(0,raceSpeed-0.08*dt*0.06);
  document.getElementById('speed').textContent=Math.round(raceSpeed);
  if(nitroTimer>0){nitroTimer--;if(nitroTimer%3===0)spawnParticles(W/2+playerX*W*0.2,H-80,Math.ceil(comboVal*2));}
  if(screenFlash>0)screenFlash--;
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;if(p.life<=0)particles.splice(i,1);}

  // Sky gradient
  const skyG=ctx.createLinearGradient(0,0,0,H/2);
  skyG.addColorStop(0,'#1a0533');skyG.addColorStop(1,'#ff6b35');
  ctx.fillStyle=skyG;ctx.fillRect(0,0,W,H/2);

  // Stars
  ctx.fillStyle='rgba(255,255,255,0.6)';
  for(let i=0;i<20;i++) ctx.fillRect((i*137.5+roadPos*0.01)%W,(i*97.3)%((H/2)-20)+10,1.5,1.5);

  // Sun
  const sunY=H*0.32+Math.sin(roadPos*0.0001)*20;
  const sunG=ctx.createRadialGradient(W*0.7,sunY,5,W*0.7,sunY,60);
  sunG.addColorStop(0,'#ffcc00');sunG.addColorStop(0.4,'#ff6600');sunG.addColorStop(1,'rgba(255,100,0,0)');
  ctx.fillStyle=sunG;ctx.fillRect(W*0.7-60,sunY-60,120,120);

  // Ground
  ctx.fillStyle='#1a472a';ctx.fillRect(0,H/2,W,H/2);

  // Road segments
  const startSeg=Math.floor(roadPos/SEG_LEN);
  let camXR=playerX*ROAD_W, camYR=1000+(segments_road[startSeg%SEGMENTS]?segments_road[startSeg%SEGMENTS].y:0)*10;
  let maxy=H, rx=0, rdx=0;
  const projected=[];
  for(let n=0;n<200;n++){
    const i=(startSeg+n)%SEGMENTS;const seg=segments_road[i];
    const z=n*SEG_LEN-(roadPos%SEG_LEN);if(z<=0)continue;
    const p=project(rx,seg.y*10,z,camXR,camYR);
    p.curve=seg.curve;p.sprite=seg.sprite;p.segIdx=i;p.n=n;
    projected.push(p);rx+=rdx;rdx+=seg.curve*0.012;
  }
  for(let n=projected.length-1;n>0;n--){
    const p1=projected[n],p2=projected[n-1];
    if(p1.y>=maxy&&p2.y>=maxy)continue;
    const isAlt=p1.segIdx%2===0;
    drawPoly(W/2,p1.y,W,W/2,p2.y,W,isAlt?'#1a472a':'#155d27');
    const rw1=p1.w*1.15,rw2=p2.w*1.15;
    drawPoly(p1.x,p1.y,rw1,p2.x,p2.y,rw2,isAlt?'#ff2244':'#ffffff');
    drawPoly(p1.x,p1.y,p1.w,p2.x,p2.y,p2.w,isAlt?'#333344':'#2a2a3a');
    if(isAlt&&raceSpeed>10){
      const lw1=p1.w*0.02,lw2=p2.w*0.02;
      drawPoly(p1.x,p1.y,lw1,p2.x,p2.y,lw2,'rgba(255,255,255,0.6)');
    }
    if(p1.sprite&&p1.scale>0.001){
      if(p1.sprite==='tree_l')drawTree(p1.x,p1.y,p1.scale,'l');
      if(p1.sprite==='tree_r')drawTree(p1.x,p1.y,p1.scale,'r');
      if(p1.sprite==='sign')drawSign(p1.x,p1.y,p1.scale);
    }
    if(p2.y<maxy)maxy=p2.y;
  }

  // Traffic
  traffic.forEach(t=>{
    const rel=((t.seg-startSeg%SEGMENTS)+SEGMENTS)%SEGMENTS;
    if(rel>0&&rel<projected.length&&projected[rel]){
      const p=projected[rel];
      drawTrafficCar(p.x+t.lane*p.w,p.y,p.scale,t.color);
      t.seg-=0.3;if(t.seg<0)t.seg+=SEGMENTS;
      if(rel<5&&rel>1&&Math.abs(playerX-t.lane)<0.5){
        overtakeCount++;t.seg=Math.floor(Math.random()*SEGMENTS*0.5)+40;t.lane=(Math.random()-0.5)*1.4;
      }
    }
  });

  drawPlayerCar(W/2+playerX*W*0.2,H-60,-curCurve);

  // Particles
  particles.forEach(p=>{ctx.globalAlpha=p.life/50;ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);});
  ctx.globalAlpha=1;

  // Speed lines
  if(raceSpeed>60){
    const int=Math.min(1,(raceSpeed-60)/160);
    ctx.strokeStyle=`rgba(0,229,255,${int*0.3})`;ctx.lineWidth=2;
    for(let i=0;i<Math.floor(int*12);i++){
      const sx=Math.random()*W,sy=H*0.3+Math.random()*H*0.5;
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+(sx-W/2)*0.1,sy+30+Math.random()*60);ctx.stroke();
    }
  }

  // Screen flash
  if(screenFlash>0){ctx.fillStyle=`rgba(0,229,255,${screenFlash/30})`;ctx.fillRect(0,0,W,H);}

  requestAnimationFrame(gameLoop);
}

// ─── INIT ───
renderSteps();
resetRace();
renderLeaderboard();
requestAnimationFrame(gameLoop);
</script>
